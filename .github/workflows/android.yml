name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  PROJECT_DIR: nihongo_v7   # Flutter project subdirectory

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 — matches compileOptions + kotlinOptions in build.gradle ─
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Flutter 3.22.x ──────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      # ── 4. Disable Flutter analytics ───────────────────────────────────────
      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      # ── 5. Flutter pub get ─────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 6. Create local.properties ─────────────────────────────────────────
      #   settings.gradle reads local.properties to locate flutter.sdk.
      #   This file is never committed (.gitignore), so we generate it here
      #   BEFORE any Gradle task runs — otherwise settings.gradle throws an
      #   assertion error and the wrapper-generation step fails.
      - name: Create local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK"   > android/local.properties
          echo "sdk.dir=$ANDROID_HOME"     >> android/local.properties
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 7. Install Gradle 8.7 ──────────────────────────────────────────────
      #   The system Gradle on ubuntu-latest is 9.5.1 which is incompatible
      #   with Flutter 3.22's Groovy build scripts (removes groovy.xml.QName).
      #   We must install 8.7 (matching distributionUrl in gradle-wrapper.properties)
      #   and use it for the wrapper-generation step below.
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      # ── 8. Generate Gradle wrapper ─────────────────────────────────────────
      #   gradlew and gradle-wrapper.jar are NOT committed to this repo.
      #   We generate them here using the pinned Gradle 8.7 installed above.
      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type all
          chmod +x gradlew
        working-directory: ${{ env.PROJECT_DIR }}/android

      # ── 9. Lint / analyse ──────────────────────────────────────────────────
      #   continue-on-error: true — info/warning-level hints must not block build
      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        working-directory: ${{ env.PROJECT_DIR }}
        continue-on-error: true

      # ── 10. Unit / widget tests ────────────────────────────────────────────
      - name: Run Flutter tests
        run: flutter test --reporter compact
        working-directory: ${{ env.PROJECT_DIR }}
        continue-on-error: true

      # ── 11. Build debug APK ────────────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug --verbose
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 12. Build release APK ──────────────────────────────────────────────
      #   signingConfigs.debug in app/build.gradle — replace with a real
      #   keystore secret before publishing to the Play Store.
      - name: Build release APK
        run: flutter build apk --release --verbose
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 13. Build App Bundle ───────────────────────────────────────────────
      - name: Build release App Bundle
        run: flutter build appbundle --release --verbose
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 14. Upload debug APK ───────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: caption-lens-debug-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # ── 15. Upload release APK ─────────────────────────────────────────────
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: caption-lens-release-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      # ── 16. Upload App Bundle ──────────────────────────────────────────────
      - name: Upload release App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: caption-lens-release-aab
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

  # ── GitHub Release — fires only on version tags e.g. git tag v7.0.0 ───────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: caption-lens-release-apk
          path: ./release-artifacts

      - name: Download release AAB
        uses: actions/download-artifact@v4
        with:
          name: caption-lens-release-aab
          path: ./release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Caption Lens ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./release-artifacts/app-release.apk
            ./release-artifacts/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
