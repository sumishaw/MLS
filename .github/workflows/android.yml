name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  PROJECT_DIR: nihongo_v7   # Flutter project lives in this subdirectory

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (matches compileOptions / kotlinOptions in build.gradle) ─
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Flutter SDK ─────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      # ── 4. Print versions for debugging ────────────────────────────────────
      - name: Print Flutter & Dart versions
        run: |
          flutter --version
          dart --version
          java -version

      # ── 5. Disable Flutter analytics (avoids interactive prompt in CI) ─────
      - name: Disable Flutter analytics
        run: flutter config --no-analytics
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 6. Install Flutter dependencies ────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 7. Lint / analyse ──────────────────────────────────────────────────
      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 8. Unit tests ──────────────────────────────────────────────────────
      - name: Run Flutter tests
        run: flutter test
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 9. Grant Gradle wrapper execute permission ─────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 10. Build debug APK ────────────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug --verbose
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 11. Build release APK ──────────────────────────────────────────────
      #   Uses debug signing config (signingConfigs.debug) from build.gradle.
      #   Swap for a real keystore secret when ready for production.
      - name: Build release APK
        run: flutter build apk --release --verbose
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 12. Build App Bundle for Play Store ───────────────────────────────
      - name: Build release App Bundle
        run: flutter build appbundle --release --verbose
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 13. Upload debug APK artifact ─────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: caption-lens-debug-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # ── 14. Upload release APK artifact ───────────────────────────────────
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: caption-lens-release-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      # ── 15. Upload App Bundle artifact ────────────────────────────────────
      - name: Upload release App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: caption-lens-release-aab
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

  # ── Optional: GitHub Release created only on version tags (e.g. v7.0.0) ──
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: caption-lens-release-apk
          path: ./release-artifacts

      - name: Download release AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: caption-lens-release-aab
          path: ./release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Caption Lens ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./release-artifacts/app-release.apk
            ./release-artifacts/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
