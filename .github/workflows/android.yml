name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  PROJECT_DIR: nihongo_v7        # Flutter project subdirectory
  GRADLE_VERSION: "8.7"          # Must match gradle-wrapper.properties distributionUrl

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ── matches compileOptions + kotlinOptions in build.gradle ─
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Flutter SDK ─────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      # ── 4. Disable Flutter analytics (suppresses interactive prompt) ───────
      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      # ── 5. Flutter pub get ─────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 6. Generate Gradle wrapper ─────────────────────────────────────────
      #   gradlew is NOT committed to this repo, so we generate it here.
      #   The version must match distributionUrl in gradle-wrapper.properties.
      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }} --distribution-type all
          chmod +x gradlew
        working-directory: ${{ env.PROJECT_DIR }}/android

      # ── 7. Lint / analyse ──────────────────────────────────────────────────
      #   continue-on-error keeps info/warning-level lint from blocking the build.
      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        working-directory: ${{ env.PROJECT_DIR }}
        continue-on-error: true

      # ── 8. Unit / widget tests ─────────────────────────────────────────────
      - name: Run Flutter tests
        run: flutter test --reporter compact
        working-directory: ${{ env.PROJECT_DIR }}
        continue-on-error: true

      # ── 9. Build debug APK ─────────────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug --verbose
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 10. Build release APK ──────────────────────────────────────────────
      #   Uses signingConfigs.debug defined in app/build.gradle.
      #   Swap for a real keystore secret when releasing to the Play Store.
      - name: Build release APK
        run: flutter build apk --release --verbose
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 11. Build App Bundle for Play Store ───────────────────────────────
      - name: Build release App Bundle
        run: flutter build appbundle --release --verbose
        working-directory: ${{ env.PROJECT_DIR }}

      # ── 12. Upload debug APK ───────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: caption-lens-debug-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # ── 13. Upload release APK ─────────────────────────────────────────────
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: caption-lens-release-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      # ── 14. Upload release App Bundle ──────────────────────────────────────
      - name: Upload release App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: caption-lens-release-aab
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

  # ── GitHub Release — only on version tags e.g. git tag v7.0.0 ────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: caption-lens-release-apk
          path: ./release-artifacts

      - name: Download release AAB
        uses: actions/download-artifact@v4
        with:
          name: caption-lens-release-aab
          path: ./release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Caption Lens ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./release-artifacts/app-release.apk
            ./release-artifacts/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
